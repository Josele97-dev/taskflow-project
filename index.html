<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {},
      }
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 font-sans transition-colors duration-500">

<header class="bg-indigo-900 text-white py-6 flex flex-col items-center text-center transition-colors duration-500">
  <h1 class="text-3xl font-bold">TaskFlow</h1>
  <p>Ahora puedes organizar tus tareas</p>

  <button id="colorbtn"
    class="mt-6 relative w-16 h-8 bg-gray-300 dark:bg-gray-600 rounded-full shadow-inner 
           flex items-center px-1 
           transition-colors duration-500 hover:scale-105 hover:shadow-lg">
    <div class="dot w-6 h-6 bg-white dark:bg-yellow-400 rounded-full shadow-md transform transition-transform duration-300"></div>
    <span class="absolute left-1 text-yellow-400 text-sm dark:text-gray-200">🌞</span>
    <span class="absolute right-1 text-gray-700 text-sm dark:text-yellow-300">🌙</span>
  </button>
</header>

<main class="flex flex-col md:flex-row gap-4 p-4 transition-colors duration-500">

  <aside id="aside" class="w-full md:w-64 bg-white dark:bg-gray-700 p-4 rounded-lg shadow transition-colors duration-500">
    <h2 class="text-lg dark:text-white font-semibold mb-2 transition-colors duration-500">Categorías</h2>
    <ul id="lista-categorias" class="list-none flex flex-wrap gap-1">

      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-indigo-900 text-white 
                 transition-all duration-300 hover:scale-105 hover:shadow-md"
          data-category="Todas">Todas</li>

      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-white text-gray-800 
                 transition-all duration-300 hover:scale-105 hover:shadow-md"
          data-category="Trabajo">Trabajo</li>

      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-white text-gray-800 
                 transition-all duration-300 hover:scale-105 hover:shadow-md"
          data-category="Estudios">Estudios</li>

      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-white text-gray-800 
                 transition-all duration-300 hover:scale-105 hover:shadow-md"
          data-category="Personal">Personal</li>
    </ul>
  </aside>

  <section id="section" class="flex-1 bg-white dark:bg-gray-700 dark:text-white p-4 rounded-lg shadow transition-colors duration-500">

    <form id="formulario-tareas" class="flex flex-wrap gap-2 mb-4">

      <input type="text" id="input-tarea" placeholder="Nueva tarea..." required
        class="flex-1 p-2 border-2 border-gray-400 rounded bg-white text-gray-800
               transition-colors duration-500
               hover:border-indigo-500 hover:shadow-md
               focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <select id="input-prioridad"
        class="p-2 border-2 border-gray-400 rounded bg-white text-gray-800
               transition-colors duration-500
               hover:border-indigo-500 hover:shadow-md
               focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="alta">Alta</option>
        <option value="media" selected>Media</option>
        <option value="baja">Baja</option>
      </select>

      <select id="input-categoria"
        class="p-2 border-2 border-gray-400 rounded bg-white text-gray-800
               transition-colors duration-500
               hover:border-indigo-500 hover:shadow-md
               focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="Trabajo">Trabajo</option>
        <option value="Estudios">Estudios</option>
        <option value="Personal">Personal</option>
      </select>

      <button type="submit"
        class="bg-indigo-900 text-white px-4 py-2 rounded
               transition-colors duration-500
               hover:bg-indigo-800 hover:shadow-md
               transition-all duration-300
               hover:scale-105
               focus:outline-none focus:ring-2 focus:ring-indigo-400">
        Añadir
      </button>
    </form>

    <input type="text" id="input-busqueda" placeholder="Buscar tareas..."
      class="mb-4 w-full p-2 border-2 border-gray-400 rounded bg-white text-gray-800
             transition-colors duration-500
             hover:border-indigo-500 hover:shadow-md
             focus:outline-none focus:ring-2 focus:ring-indigo-500">

    <div class="flex font-bold mb-2 items-center transition-colors duration-500">
      <span id="titulo1" class="flex-1">Tareas</span>
      <span id="titulo-estado" class="ml-5">Estado</span>
      <span id="titulo2" class="ml-5">Prioridad</span>
      <span id="titulo3" class="ml-5">Acciones</span>
    </div>

    <ul id="lista-tareas" class="transition-colors duration-500"></ul>

  </section>
</main>

<script src="app.js"></script>
</body>
</html>
