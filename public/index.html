<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>

  <!-- TailwindCSS desde CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Configuración de Tailwind para habilitar modo oscuro por clase -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {},
      },
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col bg-gray-100 dark:bg-gray-900 text-gray-800 transition-colors duration-500" style="font-family: 'Inter', sans-serif;">

<header class="relative bg-gradient-to-r from-indigo-900 via-indigo-800 to-indigo-700 
               dark:from-gray-800 dark:via-gray-700 dark:to-gray-600
               text-white py-12 sm:py-14 md:py-16 px-4 flex flex-col items-center text-center 
               shadow-xl rounded-b-3xl transition-all duration-500">

  <!-- Contador esquina superior derecha -->
  <p id="contador-pendientes" 
   class="absolute bottom-3 right-3 text-xs font-semibold text-indigo-100 dark:text-gray-300 bg-indigo-800 dark:bg-gray-700 px-2 py-1 rounded-full max-w-[180px] whitespace-nowrap">
  </p>

  <h1 class="font-extrabold tracking-wide drop-shadow-lg flex items-center gap-2
             text-4xl sm:text-5xl md:text-6xl">
    <span class="text-4xl sm:text-5xl md:text-6xl">📋</span>
    TaskFlow
  </h1>

  <p class="mt-4 text-indigo-200 dark:text-gray-200 opacity-90
            text-sm sm:text-base md:text-lg">
    Ahora puedes organizar tus tareas
  </p>

  <!-- Botón modo oscuro -->
  <button id="colorbtn"
    class="absolute top-4 right-4 
           w-14 h-7 sm:w-20 sm:h-10
           bg-gray-300 dark:bg-gray-500 rounded-full shadow-inner 
           flex items-center px-1 transition-all duration-500 hover:scale-110">

    <div class="dot 
                w-5 h-5 sm:w-8 sm:h-8
                bg-white dark:bg-yellow-400 rounded-full shadow-md 
                transform transition-transform duration-300
                dark:translate-x-7 sm:dark:translate-x-10"></div>

    <span class="absolute left-0 
                 w-7 h-7 sm:w-10 sm:h-10
                 flex items-center justify-center text-yellow-400 text-xs sm:text-sm dark:text-gray-200">🌞</span>

    <span class="absolute right-0 
                 w-7 h-7 sm:w-10 sm:h-10
                 flex items-center justify-center text-gray-700 text-xs sm:text-sm dark:text-yellow-300">🌙</span>
  </button>

</header>


<main class="flex-1 flex flex-col md:flex-row md:items-start gap-4 p-4 transition-colors duration-500">

  <!-- Categorías -->
  <aside id="aside" class="w-full md:w-64 bg-white dark:bg-gray-700 p-4 rounded-lg shadow transition-colors duration-500">
    <h2 class="text-lg dark:text-white font-semibold mb-2 transition-colors duration-500">Categorías</h2>

    <ul id="lista-categorias" class="list-none flex flex-col gap-1">
      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-gray-200 text-gray-800 dark:bg-gray-600 dark:text-white transition-transform duration-300 hover:scale-105"
          data-category="Todas">Todas</li>

      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-gray-200 text-gray-800 dark:bg-gray-600 dark:text-white transition-transform duration-300 hover:scale-105"
          data-category="Trabajo">Trabajo</li>

      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-gray-200 text-gray-800 dark:bg-gray-600 dark:text-white transition-transform duration-300 hover:scale-105"
          data-category="Estudios">Estudios</li>

      <li class="cursor-pointer px-2 py-1 rounded w-full text-center bg-gray-200 text-gray-800 dark:bg-gray-600 dark:text-white transition-transform duration-300 hover:scale-105"
          data-category="Personal">Personal</li>
    </ul>

    <!-- Nueva categoría -->
    <div class="mt-4 relative">
      <input id="input-nueva-categoria"
             type="text"
             placeholder="Nueva categoría..."
             class="w-full pr-10 p-2 border-2 border-gray-400 dark:border-gray-500 rounded
                    bg-white dark:bg-gray-600 text-gray-800 dark:text-white
                    transition-colors duration-500
                    hover:border-indigo-500 dark:hover:border-indigo-300 hover:shadow-md
                    focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-300">

      <button id="btn-agregar-categoria"
              class="absolute right-2 top-1/2 -translate-y-1/2
                     w-6 h-6 flex items-center justify-center
                     bg-indigo-900 dark:bg-indigo-400 text-white text-sm font-bold
                     rounded-full hover:scale-110 transition">
        +
      </button>
    </div>

  </aside>

  <!-- Sección principal -->
  <section id="section" class="flex-1 bg-white dark:bg-gray-700 dark:text-white p-4 rounded-lg shadow transition-colors duration-500">

    <form id="formulario-tareas" class="flex flex-wrap gap-2 mb-4 md:items-end">

      <!-- Nueva tarea -->
      <div class="flex flex-col flex-1 min-w-[220px]">
        <span class="text-xs font-semibold text-gray-700 dark:text-gray-200 tracking-wide mb-1">Nueva tarea</span>
        <input type="text" id="input-tarea" placeholder="Escribe una nueva tarea..." required
          class="h-12 p-2 border-2 border-gray-400 dark:border-gray-500 rounded bg-white dark:bg-gray-600 text-gray-800 dark:text-white
                 transition-colors duration-500 hover:border-indigo-500 dark:hover:border-indigo-300 hover:shadow-md
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-300">
      </div>

      <!-- Prioridad -->
      <div class="flex flex-col min-w-[140px] md:w-40">
        <span class="text-xs font-semibold text-gray-700 dark:text-gray-200 tracking-wide mb-1">Prioridad</span>
        <select id="input-prioridad"
          class="h-12 p-2 border-2 border-gray-400 dark:border-gray-500 rounded bg-white dark:bg-gray-600 text-gray-800 dark:text-white
                 transition-colors duration-500 hover:border-indigo-500 dark:hover:border-indigo-300 hover:shadow-md
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-300">
          <option value="alta">Alta</option>
          <option value="media" selected>Media</option>
          <option value="baja">Baja</option>
        </select>
      </div>

      <!-- Categoría -->
      <div class="flex flex-col min-w-[140px] md:w-40">
        <span class="text-xs font-semibold text-gray-700 dark:text-gray-200 tracking-wide mb-1">Categoría</span>
        <select id="input-categoria"
          class="h-12 p-2 border-2 border-gray-400 dark:border-gray-500 rounded bg-white dark:bg-gray-600 text-gray-800 dark:text-white
                 transition-colors duration-500 hover:border-indigo-500 dark:hover:border-indigo-300 hover:shadow-md
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-300">
          <option value="Trabajo">Trabajo</option>
          <option value="Estudios">Estudios</option>
          <option value="Personal">Personal</option>
        </select>
      </div>

      <!-- Fecha -->
      <div class="flex flex-col min-w-[140px] md:w-40">
        <span class="text-xs font-semibold text-gray-700 dark:text-gray-200 tracking-wide mb-1">Fecha límite (opcional)</span>
        <input type="date" id="input-fecha" max="2050-12-31"
          class="h-12 p-2 border-2 border-gray-400 dark:border-gray-500 rounded bg-white dark:bg-gray-600 text-gray-800 dark:text-white
                 transition-colors duration-500 hover:border-indigo-500 dark:hover:border-indigo-300 hover:shadow-md
                 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-300">
      </div>

      <!-- Botón añadir -->
      <button type="submit"
        class="h-12 bg-indigo-900 dark:bg-indigo-400 text-white px-4 rounded self-end md:self-auto
               transition-colors duration-500 hover:bg-indigo-800 dark:hover:bg-indigo-300
               hover:shadow-md hover:scale-105
               focus:outline-none focus:ring-2 focus:ring-indigo-400">
        Añadir
      </button>

    </form>

    <!-- Búsqueda -->
    <div class="mb-4 flex flex-wrap gap-2 items-center">
      <input type="text" id="input-busqueda" placeholder="Buscar tareas..."
        class="h-12 flex-1 min-w-[180px] p-2 border-2 border-gray-400 dark:border-gray-500 rounded bg-white dark:bg-gray-600 text-gray-800 dark:text-white
               transition-colors duration-500 hover:border-indigo-500 dark:hover:border-indigo-300 hover:shadow-md
               focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-300">

      <select id="input-orden"
        class="h-12 w-full md:w-[249px] md:flex-none p-2 border-2 border-gray-400 dark:border-gray-500 rounded bg-white dark:bg-gray-600 text-gray-800 dark:text-white
               transition-colors duration-500 hover:border-indigo-500 dark:hover:border-indigo-300 hover:shadow-md
               focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-300">
        
        <option value="creacion" selected>Orden original (creación)</option>
        <option value="prioridad">Prioridad (alta → baja)</option>
        <option value="prioridad-inversa">Prioridad (baja → alta)</option>
        <option value="texto">Texto (A → Z)</option>
        <option value="texto-inverso">Texto (Z → A)</option>
        <option value="estado">Estado (pendientes primero)</option>
</select>

    </div>
    
    <!-- Encabezado visible solo en escritorio -->
    <div class="hidden md:flex font-semibold text-gray-700 dark:text-gray-200 px-2 mt-4 mb-2">
      <span class="flex-1">Lista de tareas</span>
      <span class="w-32 text-center">Estado</span>
      <span class="w-28 text-center">Prioridad</span>
      <span class="w-28 text-center">Acciones</span>
    </div>

    <ul id="lista-tareas" class="transition-colors duration-500"></ul>

  </section>
</main>

<footer class="mt-4 mb-2 text-center text-sm text-gray-400 dark:text-gray-200 transition-colors duration-500">
  TaskFlow · 2026
</footer>

<!-- Lógica de la aplicación -->
<script type="module" src="app.js"></script>
</body>
</html>
